# Manual-only distribution workflow.
# This workflow never runs on normal pushes or tags.
name: iOS TestFlight Upload (manual only)

on:
  workflow_dispatch:
    inputs:
      confirm_distribution:
        description: 'Set to true to allow App Store Connect/TestFlight upload steps.'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ios-testflight-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - name: Abort unless distribution is explicitly confirmed
        run: |
          if [ "${{ inputs.confirm_distribution }}" != "true" ]; then
            echo "This workflow is manual-only. Re-run it with confirm_distribution enabled." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies (lockfile enforced)
        run: flutter pub get --enforce-lockfile

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # Manual signing setup. Requires repo/environment secrets.
      - name: Install signing certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build and upload via Fastlane
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_KEY_P8 }}
          TESTFLIGHT_DISTRIBUTE_EXTERNAL: 'true'
          TESTFLIGHT_NOTIFY_EXTERNAL_TESTERS: 'false'
          TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_EXTERNAL_GROUPS }}
          TESTFLIGHT_CHANGELOG: >-
            Fixed release/TestFlight splash hang on iOS. Improved startup stability.
            Please verify cold launch to camera, gallery loading, and capture/save flow.
          CONFIRM_TESTFLIGHT_UPLOAD: 'true'
        run: |
          set -euo pipefail
          cd ios
          bundle install
          bundle exec fastlane ios beta
