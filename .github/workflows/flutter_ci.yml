name: Flutter iOS Validation (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flutter-ios-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-validation:
    name: CocoaPods and iOS release build (unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Install iOS pods
        run: |
          cd ios
          pod install

      - name: Build iOS app (release, unsigned)
        run: flutter build ios --release --no-codesign
